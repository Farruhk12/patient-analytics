<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedAnalytics — Вход</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-1: #6366f1;
      --brand-2: #8b5cf6;
      --brand-3: #a855f7;
      --brand-grad: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #a855f7 100%);
      --bg:      #eef1f8;
      --card:    #ffffff;
      --card-2:  #fbfcfe;
      --text:    #14162e;
      --text-2:  #4b5168;
      --text-3:  #9aa0b4;
      --border:  #e6e9f2;
      --red:     #f43f5e;
      --radius:  13px;
      --font:    'Inter', system-ui, sans-serif;
      --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;
      --shadow:  0 30px 70px -24px rgba(60,50,140,.4), 0 8px 24px -12px rgba(21,26,58,.12);
      --glow:    0 10px 28px -6px rgba(124,92,246,.5);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:    #0a0b18;
        --card:  #15172c;
        --card-2:#191b32;
        --text:  #eef0fb;
        --text-2:#a6abc7;
        --text-3:#6b7096;
        --border:#262943;
        --shadow:0 30px 70px -24px rgba(0,0,0,.8);
      }
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }
    /* Декоративный фон */
    body::before, body::after {
      content: ""; position: absolute; border-radius: 50%; filter: blur(80px); opacity: .5; z-index: 0;
    }
    body::before { width: 480px; height: 480px; background: #a5b4fc; top: -140px; left: -120px; }
    body::after  { width: 460px; height: 460px; background: #d8b4fe; bottom: -160px; right: -120px; }
    @media (prefers-color-scheme: dark) {
      body::before { background: #4338ca; opacity: .35; }
      body::after  { background: #7e22ce; opacity: .3; }
    }

    .login-wrap { width: 100%; max-width: 410px; position: relative; z-index: 1; }
    .login-card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 42px 38px 34px;
      border: 1px solid var(--border);
    }

    .login-brand {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 30px;
    }
    .login-brand-icon {
      width: 46px; height: 46px;
      background: var(--brand-grad);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--glow);
    }
    .login-brand-icon svg { width: 24px; height: 24px; stroke: #fff; }
    .login-brand-name {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -.5px;
    }

    .login-heading { font-family: var(--font-display); font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 6px; text-align: center; }
    .login-sub { font-size: 13.5px; color: var(--text-2); margin-bottom: 28px; line-height: 1.5; text-align: center; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 700; color: var(--text-3); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .5px; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--card-2);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    input:focus { border-color: var(--brand-2); box-shadow: 0 0 0 4px rgba(139,92,246,.16); }
    input:disabled { opacity: .5; cursor: not-allowed; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--brand-grad);
      color: #fff; border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: 14.5px; font-weight: 700;
      cursor: pointer; letter-spacing: .2px; margin-top: 8px;
      box-shadow: var(--glow);
      transition: transform .15s, filter .15s;
    }
    .btn-login:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; box-shadow: none; }

    .login-error {
      display: none; align-items: center; gap: 8px;
      background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.3);
      color: var(--red); border-radius: var(--radius);
      padding: 11px 14px; font-size: 13px; margin-top: 14px;
    }
    .login-error.show { display: flex; }
    .login-error svg { width: 16px; height: 16px; flex-shrink: 0; }

    .login-lockout {
      display: none; flex-direction: column; align-items: center; gap: 8px;
      background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3);
      border-radius: var(--radius); padding: 18px; font-size: 13px;
      color: #c2410c; margin-top: 14px; text-align: center;
    }
    @media (prefers-color-scheme: dark) { .login-lockout { color: #fdba74; } }
    .login-lockout.show { display: flex; }
    .login-lockout svg { width: 26px; height: 26px; }
    .login-lockout strong { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <span class="login-brand-name">MedAnalytics</span>
      </div>

      <p class="login-heading">Добро пожаловать</p>
      <p class="login-sub">Введите логин и пароль для входа в систему</p>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="loginInput">Логин</label>
          <input type="text" id="loginInput" placeholder="Ваш логин" autocomplete="username" maxlength="64">
        </div>
        <div class="form-group">
          <label for="passwordInput">Пароль</label>
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" maxlength="128">
        </div>
        <button type="submit" id="loginBtn" class="btn-login">Войти</button>
      </form>

      <div id="loginError" class="login-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="loginErrorText">Неверный логин или пароль</span>
      </div>

      <div id="loginLockout" class="login-lockout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <strong>Доступ временно заблокирован</strong>
        <span id="lockoutText">Слишком много неверных попыток. Попробуйте через несколько минут.</span>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    if (Auth.getSession()) {
      window.location.href = 'index.html';
    }

    function showLockout() {
      var mins = Auth.lockoutRemaining();
      document.getElementById('lockoutText').textContent =
        'Слишком много неверных попыток. Попробуйте через ' + mins + ' мин.';
      document.getElementById('loginLockout').classList.add('show');
      document.getElementById('loginError').classList.remove('show');
      document.getElementById('loginBtn').disabled = true;
      document.getElementById('loginInput').disabled = true;
      document.getElementById('passwordInput').disabled = true;
    }

    // Проверяем блокировку сразу при загрузке
    if (Auth.isLockedOut()) showLockout();

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var loginVal = document.getElementById('loginInput').value.trim();
      var password = document.getElementById('passwordInput').value;
      var errEl    = document.getElementById('loginError');
      var errText  = document.getElementById('loginErrorText');

      var result = Auth.login(loginVal, password);

      if (result.ok) {
        window.location.href = 'index.html';
        return;
      }

      if (result.locked) {
        showLockout();
        return;
      }

      errEl.classList.add('show');
      if (result.attemptsLeft === 0) {
        errText.textContent = 'Вход заблокирован. Попробуйте через 15 минут.';
        showLockout();
      } else if (result.attemptsLeft !== undefined) {
        errText.textContent = 'Неверный логин или пароль. Осталось попыток: ' + result.attemptsLeft;
      } else {
        errText.textContent = 'Неверный логин или пароль';
      }

      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    });

    ['loginInput', 'passwordInput'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        if (!Auth.isLockedOut()) {
          document.getElementById('loginError').classList.remove('show');
        }
      });
    });
  </script>
</body>
</html>
