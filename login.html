<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedAnalytics — Вход</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f0f4ff;
      --card:    #ffffff;
      --text:    #0f172a;
      --text-2:  #64748b;
      --border:  #e2e8f0;
      --blue:    #3b82f6;
      --blue-d:  #2563eb;
      --red:     #ef4444;
      --radius:  12px;
      --font:    'Inter', system-ui, sans-serif;
      --shadow:  0 4px 24px rgba(59,130,246,.12), 0 1px 4px rgba(0,0,0,.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:    #0f172a;
        --card:  #1e293b;
        --text:  #f1f5f9;
        --text-2:#94a3b8;
        --border:#334155;
        --shadow:0 4px 24px rgba(0,0,0,.4);
      }
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrap { width: 100%; max-width: 400px; }

    .login-card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 40px 36px 36px;
      border: 1px solid var(--border);
    }

    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-brand-icon {
      width: 40px; height: 40px;
      background: var(--blue);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-brand-icon svg { width: 22px; height: 22px; stroke: #fff; }
    .login-brand-name {
      font-size: 22px; font-weight: 800;
      color: var(--text); letter-spacing: -.5px;
    }

    .login-heading { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--text-2); margin-bottom: 28px; line-height: 1.5; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    input:disabled { opacity: .5; cursor: not-allowed; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 6px;
      letter-spacing: .2px;
    }
    .btn-login:hover:not(:disabled) { background: var(--blue-d); }
    .btn-login:active:not(:disabled) { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .login-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
    }
    .login-error.show { display: flex; }
    .login-error svg { width: 16px; height: 16px; flex-shrink: 0; }

    .login-lockout {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 13px;
      color: #c2410c;
      margin-top: 12px;
      text-align: center;
    }
    .login-lockout.show { display: flex; }
    .login-lockout svg { width: 24px; height: 24px; }
    .login-lockout strong { font-size: 14px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <span class="login-brand-name">MedAnalytics</span>
      </div>

      <p class="login-heading">Добро пожаловать</p>
      <p class="login-sub">Введите логин и пароль для входа в систему</p>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="loginInput">Логин</label>
          <input type="text" id="loginInput" placeholder="Ваш логин" autocomplete="username" maxlength="64">
        </div>
        <div class="form-group">
          <label for="passwordInput">Пароль</label>
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" maxlength="128">
        </div>
        <button type="submit" id="loginBtn" class="btn-login">Войти</button>
      </form>

      <div id="loginError" class="login-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="loginErrorText">Неверный логин или пароль</span>
      </div>

      <div id="loginLockout" class="login-lockout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <strong>Доступ временно заблокирован</strong>
        <span id="lockoutText">Слишком много неверных попыток. Попробуйте через несколько минут.</span>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    if (Auth.getSession()) {
      window.location.href = 'index.html';
    }

    function showLockout() {
      var mins = Auth.lockoutRemaining();
      document.getElementById('lockoutText').textContent =
        'Слишком много неверных попыток. Попробуйте через ' + mins + ' мин.';
      document.getElementById('loginLockout').classList.add('show');
      document.getElementById('loginError').classList.remove('show');
      document.getElementById('loginBtn').disabled = true;
      document.getElementById('loginInput').disabled = true;
      document.getElementById('passwordInput').disabled = true;
    }

    // Проверяем блокировку сразу при загрузке
    if (Auth.isLockedOut()) showLockout();

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var loginVal = document.getElementById('loginInput').value.trim();
      var password = document.getElementById('passwordInput').value;
      var errEl    = document.getElementById('loginError');
      var errText  = document.getElementById('loginErrorText');

      var result = Auth.login(loginVal, password);

      if (result.ok) {
        window.location.href = 'index.html';
        return;
      }

      if (result.locked) {
        showLockout();
        return;
      }

      errEl.classList.add('show');
      if (result.attemptsLeft === 0) {
        errText.textContent = 'Вход заблокирован. Попробуйте через 15 минут.';
        showLockout();
      } else if (result.attemptsLeft !== undefined) {
        errText.textContent = 'Неверный логин или пароль. Осталось попыток: ' + result.attemptsLeft;
      } else {
        errText.textContent = 'Неверный логин или пароль';
      }

      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    });

    ['loginInput', 'passwordInput'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        if (!Auth.isLockedOut()) {
          document.getElementById('loginError').classList.remove('show');
        }
      });
    });
  </script>
</body>
</html>
